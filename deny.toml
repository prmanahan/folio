[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = [
    # Prefer rustls over openssl for TLS
    { crate = "openssl-sys", wrappers = [] },
]
# Transitive duplicates from ecosystem version transitions — reviewed 2026-03-26
skip = [
    { crate = "core-foundation" },
    { crate = "cpufeatures" },
    { crate = "getrandom" },
    { crate = "hashbrown" },
    { crate = "r-efi" },
    { crate = "rand" },
    { crate = "rand_core" },
    { crate = "schemars" },
    { crate = "schemars_derive" },
    { crate = "thiserror" },
    { crate = "thiserror-impl" },
    { crate = "windows-sys" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
